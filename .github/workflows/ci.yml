name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Format check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Verify (format check + tests)
        run: mvn --batch-mode verify
